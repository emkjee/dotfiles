[docker_context]
symbol = "´îê"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg: color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
ignore_base = false
format = '[[ $symbol( $environment) ](fg: color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg: color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:color_fg0 bg:color_bg1"
format = '[ ´É║ $time ]($style)'

[cmd_duration]
disabled = false
show_milliseconds = false
show_notifications = true
min_time_to_notify = 45000
min_time = 5000
style = " italic color_orange2"
format = "[took $duration ]($style)"

[shlvl]
disabled = false
symbol = "¾░¿è"
style = " italic color_fg0"
format = '[$symbol-($shlvl) ]($style)'

[line_break]
disabled = true

[fill]
symbol = ' '

